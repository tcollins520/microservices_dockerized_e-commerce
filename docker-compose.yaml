version: "3.8"
services:
  client:
    build:
    # specify dockerfile path
      context: ./client
    ports:
      - "4200:4200"
    # container name should be the same as what's in config file, the name is the DNS
    image: tcollins50/emartapp_client
    container_name: client
    # api and webapi containers should start before client container starts up
    depends_on:
      - api
      - webapi

  api:
    build:
      context: ./nodeapi
    ports:
      - "5000:5000"
    image: tcollins50/emartapp_api
    restart: always
    container_name: api
    # nginx container and mongo db needs to start before api container starts
    depends_on:
      - nginx
      - emongo

  webapi:
    build:
      context: ./javaapi
    ports:
      - "9000:9000"
    image: tcollins50/emartapp_webapi
    restart: always
    container_name: webapi
    # emartdb should start before webapi starts
    depends_on:
      - emartdb

  nginx:
  # use official nginx image
    restart: always
    image: nginx:latest
    container_name: nginx
    # map our custom nginx config files to the default config file
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
    ports:
      - "80:80"

  emongo:
    image: mongo:4
    container_name: emongo
    # set environment variables to intialize the db
    environment:
      - MONGO_INITDB_DATABASE=epoc
    ports:
      - "27017:27017"

  emartdb:
    image: mysql:8.0.33
    container_name: emartdb
    ports:
      - "3306:3306"
    # set environment variables for root password and database name
    environment:
      - MYSQL_ROOT_PASSWORD=emartdbpass
      - MYSQL_DATABASE=books
